<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>LaVida Round Card</title>
<!-- Egress is Microsoft-ONLY, same discipline as the Note Composer. Phase 1 makes NO network calls
     at all (everything is generated in the browser); the Speech/OpenAI hosts are pre-declared here
     for Phase 2 so the policy is reviewed once, not loosened later under deadline. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://graph.microsoft.com https://login.microsoftonline.com https://*.cognitiveservices.azure.com https://*.openai.azure.com wss://*.cognitiveservices.azure.com; form-action 'self' https://login.microsoftonline.com; frame-src https://login.microsoftonline.com; base-uri 'self'; object-src 'none'">
<style>
  :root{
    --bg:#f7f5f1; --panel:#fff; --ink:#1d2b2a; --muted:#6b7a79; --line:#dfdcd6;
    --teal:#0f8a7c; --teal-dark:#0b6b60; --amber:#f4b740; --red:#c2453a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  body{margin:0; background:var(--bg); color:var(--ink);
    font:16px/1.45 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    padding-bottom:96px; /* room for the sticky footer */
    padding-left:env(safe-area-inset-left); padding-right:env(safe-area-inset-right)}
  h1{font-size:18px; margin:0}
  header{position:sticky; top:0; z-index:20; background:var(--teal); color:#fff;
    padding:12px 14px; padding-top:calc(12px + env(safe-area-inset-top));
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.15)}
  header .sub{font-size:12.5px; opacity:.9}
  .wrap{max-width:720px; margin:0 auto; padding:14px}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:14px; margin-bottom:14px; box-shadow:0 1px 3px rgba(0,0,0,.05)}
  label{display:block; font-size:13px; font-weight:600; color:var(--muted); margin:10px 0 4px}
  input,select,textarea{width:100%; font:inherit; font-size:16px; /* 16px stops iOS zoom-on-focus */
    padding:11px 12px; border:1px solid var(--line); border-radius:10px; background:#fff; color:var(--ink)}
  textarea{min-height:76px; resize:vertical}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--teal); outline-offset:1px; border-color:var(--teal)}
  button{font:inherit; font-weight:650; border-radius:10px; border:1px solid var(--line);
    background:#fff; color:var(--ink); padding:11px 14px; cursor:pointer; min-height:44px}
  button.primary{background:var(--teal); color:#fff; border-color:var(--teal)}
  button.primary:active{background:var(--teal-dark)}
  button.ghost{background:transparent; border-style:dashed; color:var(--muted); width:100%}
  button.tiny{padding:6px 10px; min-height:34px; font-size:13px; font-weight:600}
  .row{display:flex; gap:8px; align-items:center; flex-wrap:wrap}
  .dims{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px}
  .hdr2{grid-template-columns:minmax(0,1fr) minmax(0,1fr)}
  /* Phones: side-by-side Date+Provider collide (iOS's date control refuses to shrink
     below its intrinsic width) — stack them instead of fighting it. */
  @media(max-width:480px){ .hdr2{grid-template-columns:1fr} }
  /* Grid items default to min-width:auto, so a wide native control (esp. iOS's date input)
     won't shrink and overflows into the box next to it. Letting the columns hit 0 forces a
     true even split so Date and Provider can't collide. */
  .dims>*{min-width:0}
  .pill{background:#eef4f3; color:var(--teal-dark); border-radius:999px; padding:3px 10px;
    font-size:12px; font-weight:700}
  .muted{color:var(--muted); font-size:13px}
  .calc{color:var(--teal-dark); font-size:12.5px; font-weight:700; margin:6px 0 2px; min-height:1px}
  .other-box{margin-top:6px}
  .checks{display:flex; flex-wrap:wrap; gap:6px; margin-top:2px}
  .chk{display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line); border-radius:999px;
    padding:8px 13px; font-size:14px; background:#fff; cursor:pointer; -webkit-tap-highlight-color:transparent}
  .chk.on{border-color:var(--teal); background:#eef4f3; color:var(--teal-dark); font-weight:600}
  .chk input{width:auto; margin:0; accent-color:var(--teal)}
  .tabs{display:flex; gap:8px; overflow-x:auto; padding:10px 14px 0; -webkit-overflow-scrolling:touch}
  .tab{white-space:nowrap; border:1px solid var(--line); background:#fff; border-radius:999px;
    padding:8px 14px; font-size:14px; font-weight:600; cursor:pointer; min-height:40px}
  .tab.on{background:var(--ink); color:#fff; border-color:var(--ink)}
  .wound-head{display:flex; justify-content:space-between; align-items:center;
    border-bottom:1px solid var(--line); padding-bottom:8px; margin-bottom:4px}
  .wound-head b{font-size:15px}
  footer{position:fixed; bottom:0; left:0; right:0; z-index:20; background:rgba(255,255,255,.97);
    border-top:1px solid var(--line); padding:10px 14px;
    padding-bottom:calc(10px + env(safe-area-inset-bottom));
    display:flex; gap:8px; justify-content:center; box-shadow:0 -2px 10px rgba(0,0,0,.06)}
  footer button{flex:1; max-width:220px}
  .modal{display:none; position:fixed; inset:0; z-index:90; background:rgba(6,10,15,.7);
    padding:16px; overflow:auto}
  .modal.on{display:block}
  .sheet{background:var(--panel); border-radius:14px; max-width:720px; margin:0 auto; padding:16px}
  .prev{border:1px solid var(--line); border-radius:10px; background:#f5f4ef; overflow:hidden; margin:10px 0}
  .prev-frame{width:100%; height:48vh; border:0; display:block; background:#fff}
  .prev-empty{padding:22px; text-align:center; color:var(--muted); font-size:14px}
  .warn{background:#fdf3e3; border:1px solid var(--amber); border-radius:10px; padding:10px;
    font-size:13px; margin:10px 0}
  #sendPick:not(:empty){border:1px solid var(--line); border-radius:10px; background:#fff;
    padding:10px 12px; margin:10px 0}
  .sp-head{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:8px; font-size:14px}
  .sp-head .sp-btns{margin-left:auto; display:flex; gap:6px}
  .sp-list{display:flex; flex-wrap:wrap; gap:6px}
  .sp-item{display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line);
    border-radius:999px; padding:8px 13px; font-size:14px; background:#fff; cursor:pointer;
    -webkit-tap-highlight-color:transparent}
  .sp-item.on{border-color:var(--teal); background:#eef4f3; color:var(--teal-dark); font-weight:600}
  .sp-item input{width:auto; margin:0; accent-color:var(--teal)}
  .toast{position:fixed; left:50%; bottom:96px; transform:translateX(-50%); background:var(--ink);
    color:#fff; padding:10px 16px; border-radius:999px; font-size:14px; z-index:99; opacity:0;
    transition:opacity .2s; pointer-events:none; max-width:90vw; text-align:center}
  .toast.on{opacity:1}
  .vault-ok{background:#e8f5ef; border:1px solid #9fd4c2; color:#0b6b60; border-radius:10px; padding:9px 12px; font-size:13px; margin-top:8px}
  .vault-err{background:#fbeae8; border:1px solid #e0a49d; color:#8f2f26; border-radius:10px; padding:9px 12px; font-size:13px; margin-top:8px}
  @media print{
    header,footer,.tabs,.no-print{display:none !important}
    body{background:#fff; padding:0}
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Round Card</h1>
    <div class="sub" id="hdrSub">orders for the nurse, before you leave</div>
    <div id="rcSyncStatusHdr" style="font-size:12px;margin-top:2px;color:rgba(255,255,255,.9)"></div>
  </div>
  <div class="row" style="gap:8px;flex:0 0 auto">
    <a id="rcNotesLink" href="index.html" title="Back to the Note Composer" style="color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.55);border-radius:8px;padding:7px 11px;font-size:13px;font-weight:600">Notes</a>
    <button class="tiny" onclick="clearAll()" title="Wipe this round from the phone">Clear</button>
  </div>
</header>

<div class="wrap">
  <!-- ROUND HEADER — facility is round-level; each facility gets its own sheet (never a shared list) -->
  <div class="card">
    <div class="row" style="justify-content:space-between">
      <b style="font-size:15px">Today's round</b>
      <span class="pill" id="countPill">0 patients</span>
    </div>
    <label for="r_fac">Facility</label>
    <select id="r_fac" onchange="onFacPick(this)"></select>
    <div class="dims hdr2">
      <div>
        <label for="r_date">Date</label>
        <input id="r_date" type="date" oninput="setRound()" style="min-width:0">
      </div>
      <div>
        <label for="r_prov">Provider</label>
        <select id="r_prov" onchange="onProvPick(this)"></select>
      </div>
    </div>
  </div>

  <!-- PATIENT TABS -->
  <div class="tabs no-print" id="tabs"></div>
  <div class="wrap" style="padding:14px 0 0">
    <div id="patientArea"></div>
  </div>
</div>

<footer class="no-print">
  <button class="primary" onclick="openReview()">Review &amp; send</button>
</footer>

<!-- REVIEW = the confirmation screen. Nothing reaches a nurse unseen. -->
<div class="modal" id="review">
  <div class="sheet">
    <div class="row" style="justify-content:space-between">
      <b>Check this, then send</b>
      <button class="tiny" onclick="closeReview()">Close</button>
    </div>
    <div id="rcSyncStatus2" style="font-size:12px;color:var(--muted);margin-top:4px"></div>
    <div class="muted" style="margin-top:6px">This is exactly what the nurse gets. Anything blank shows as “—”.</div>
    <div id="gaps"></div>
    <div id="sendPick"></div>
    <div class="prev" id="prev"></div>
    <label for="toSel">Send to</label>
    <select id="toSel"></select>
    <div class="muted" style="margin-top:6px">Fixed list on purpose — a typo can't send a patient's info to a stranger.</div>
    <div class="row" style="margin-top:12px">
      <button id="emailBtn" class="primary" style="flex:1" onclick="emailSheet()">Email it</button>
      <button id="printBtn" style="flex:1" onclick="printSheet()">Print it</button>
    </div>
    <div class="row" style="margin-top:8px">
      <button id="vaultBtn" style="flex:1;border-color:var(--teal);color:var(--teal-dark);font-weight:650" onclick="saveVault()">☁ Save to ClinicalVault</button>
    </div>
    <div id="vaultResult" style="display:none"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Microsoft MSAL (bundled locally, same-origin — no CDN). Powers the optional "Save to
     ClinicalVault". Same library file, Entra app, and redirect.html as the Note Composer,
     so it's ONE sign-in across both tools. -->
<script src="msal-browser.min.js"></script>
<script>
/* ============================================================================
   LaVida ROUND CARD — Phase 1 (tap/type)
   The problem this solves: nurses are measured on how fast orders land, and today
   orders don't exist until charting is done, hours after rounds. This makes the
   orders exist at the door.

   PHI discipline (same as the Note Composer):
   - Note-authoring makes ZERO network calls. Everything below is generated in the browser.
   - The ONE cloud action is "Save to ClinicalVault": Microsoft-only egress
     (login.microsoftonline.com + graph.microsoft.com) into the practice's own
     BAA-covered SharePoint tenant, with the provider's own Entra sign-in. It files
     the orders sheet under Daily Handoffs/<facility>/<date> and a per-patient
     roundcard.v1 record under RoundCards/<facility>/ so the Note Composer can
     pre-fill the note from what was captured at bedside.
   - The round lives in sessionStorage only -> it dies when the tab closes. No disk,
     no localStorage, no analytics. An idle auto-lock wipes it after 15 min untouched.
   - Email recipients come from a fixed allowlist. There is no free-typed recipient.
   - Nothing is logged to the console.
   Phase 2 (voice) adds Azure Speech + Azure OpenAI, both under the Microsoft BAA,
   authenticated with the provider's own Entra token. Never Web Speech (Google).
   ========================================================================== */

/* Approved facility contacts. PLACEHOLDER — points at Scott's admin inbox so testing
   cannot email a real facility. At go-live, replace with the real approved nurse
   contacts, kept in the private ops vault (this file is hosted publicly). */
const FACILITY_CONTACTS = [
  { name: 'TEST — Abby (abbs2118@gmail.com)', email: 'abbs2118@gmail.com' },   // test recipient for the handoff email — SYNTHETIC data only (Gmail is not a BAA inbox)
  { name: 'TEST — admin inbox (not a real facility)', email: 'admin@lavidaheal.com' },
];

/* Option lists are kept in step with the Note Composer's note template on purpose:
   the card feeds the composer later (Phase 3), so a value picked here must map 1:1 to
   what the composer expects. Source of truth = the composer macro
   (Etiology / Stage / Drainage / odor / Status lines). */
const WOUND_TYPES = ['Pressure injury','Diabetic ulcer','Venous','Arterial','Surgical','Traumatic','MASD','Other'];
const STAGES      = ['Stage 1','Stage 2','Stage 3','Stage 4','Unstageable','DTI'];
const DRAINAGE    = ['None','Scant','Small','Moderate','Large'];
const ODOR        = ['None','Mild','Strong'];
/* Checkbox (pick-multiple) fields — MATCH the composer note's checkbox lines exactly (Etiology =
   Type, Exposed structures, Periwound) so a Phase-3 pull ticks the same boxes. Practice request. */
const EXPOSED     = ['None','Subcutaneous tissue','Tendon','Muscle','Bone','Hardware'];
const PERIWOUND   = ['Normal','Macerated','Erythematous','Indurated','Ecchymotic','Callused','Fluctuant','Warm','Tender'];
/* Facility wants just the three-state trend. "Improving" (not "Improved") matches the
   composer note's Status wording so a Phase-3 pre-fill copies straight across. */
const STATUS      = ['Improving','Stable','Worsening'];

/* ---------- state: sessionStorage only, wipes on tab close ---------- */
const KEY = 'lavida_roundcard';
let S = load();
function blank(){ return { round:{fac:'',date:todayISO(),prov:''}, pts:[], active:0 }; }
function load(){
  try{ const r = sessionStorage.getItem(KEY); if(r){ const o=JSON.parse(r); normalizePts(o); return o; } }catch(e){}
  return blank();
}
/* Backfill fields added after a card was first saved this session: every patient needs a stable `id`
   (so the composer can tell two same-name patients apart and never double-pull) and a `send` flag
   (default true — you're sending everyone unless you uncheck them). */
function normalizePts(o){
  if(!o || !Array.isArray(o.pts)) return;
  o.pts.forEach(p=>{ if(!p.id) p.id=newId(); if(typeof p.send!=='boolean') p.send=true; });
}
function save(){ try{ sessionStorage.setItem(KEY, JSON.stringify(S)); }catch(e){} if(typeof scheduleRcAutoSave==='function') scheduleRcAutoSave(); }
function todayISO(){ const d=new Date(), p=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }

/* ---------- helpers ---------- */
function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;')
  .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function v(s){ s=(s==null?'':String(s)).trim(); return s || '—'; }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('on');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('on'),2600); }

function newWound(){ return { loc:'', type:[], stage:'', l:'', w:'', d:'', drain:'', odor:'', status:'', wbGran:'', wbSlough:'', wbFib:'', wbEpi:'', wbEschar:'', exposed:[], periwound:[], undermining:'', tunneling:'', orders:'' }; }
/* Wound bed = the composer's structured field: gran/slough/fibrin/epithelialization % + eschar yes/no.
   Compose the same "N% granulation, …, eschar: yes" string for the sheet; the composer pull maps each
   piece straight into its :wb: keys. */
function wbText(w){
  const parts=[];
  [['wbGran','granulation'],['wbSlough','slough'],['wbFib','fibrin/exudate'],['wbEpi','epithelialization']]
    .forEach(([f,lab])=>{ const v=String(w[f]||'').trim(); if(v) parts.push(v+'% '+lab); });
  if((w.wbEschar||'').trim()) parts.push('eschar: '+w.wbEschar.trim());
  return parts.join(', ');
}
/* Stable per-patient id — the composer's match key (filename in the vault too). Random + time so two
   patients added in the same second can't collide; never derived from the name (two "Maria Garcia"
   stay distinct). */
function newId(){ return 'rc-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,7); }
function newPt(){ return { id:newId(), name:'', edu:'', wounds:[newWound()], send:true }; }
function activePt(){ return S.pts[S.active] || null; }

/* Size prints only what was actually measured — a bare "cm" or a half-filled
   dimension string is worse than saying nothing. */
/* Surface area = L × W, volume = L × W × D (same simple model as the composer). Returns null
   until the needed dimensions are present, so a half-filled size never shows a bogus number. */
function calcArea(w){ const a=parseFloat(w.l), b=parseFloat(w.w); return (isFinite(a)&&isFinite(b)&&a>=0&&b>=0)? a*b : null; }
function calcVol(w){ const a=parseFloat(w.l), b=parseFloat(w.w), c=parseFloat(w.d); return (isFinite(a)&&isFinite(b)&&isFinite(c)&&a>=0&&b>=0&&c>=0)? a*b*c : null; }
function calcText(w){
  const ar=calcArea(w); if(ar==null) return '';
  let s='Surface area '+ar.toFixed(1)+' cm²';
  const vol=calcVol(w); if(vol!=null) s+='  ·  Volume '+vol.toFixed(1)+' cm³';
  return s;
}
function sizeText(w){
  const has = x => String(x||'').trim() !== '';
  if(!has(w.l) && !has(w.w) && !has(w.d)) return '';
  const dim = x => has(x) ? String(x).trim() : '?';
  let s = dim(w.l)+' × '+dim(w.w);
  if(has(w.d)) s += ' × '+dim(w.d);
  s += ' cm';
  const ar=calcArea(w);
  if(ar!=null){
    let extra='area '+ar.toFixed(1)+' cm²';
    const vol=calcVol(w); if(vol!=null) extra+=', volume '+vol.toFixed(1)+' cm³';
    s += '  ('+extra+')';
  }
  return s;
}
/* Resolve a field for the sheet/record. Handles single dropdowns (drain/odor/status) AND multi
   checkbox arrays (type/exposed/periwound). "Other" carries free text in <field>Other. */
function disp(w,field){
  const one = x => x==='Other' ? (String(w[field+'Other']||'').trim() || 'Other') : x;
  const val = w[field];
  return Array.isArray(val) ? val.map(one).join(', ') : one(val||'');
}
/* Stage only exists for pressure wounds — that's the nurses' own rule ("if pressure, what stage"). */
function isPressure(w){ return (Array.isArray(w.type)?w.type:[]).some(t=>/^Pressure/.test(t)); }

/* ---------- round header ---------- */
/* Facility + Provider are DROPDOWNS (same reason as the composer, 2026-07-17): free-typing
   lets a name's spelling drift ("Crestmoor" vs "Crestmore"), which splits that facility's
   handoff folders and — worse here — its RoundCards/ records. Only the LIVE buildings and
   ACTIVELY ROUNDING providers are seeded in this public file; the full rosters live in the
   private ops vault and get added at go-live. The escape options mean a missing name never
   blocks a round — it's remembered for the rest of the session. */
const FACILITIES = ['University Heights','Crestmoor'];
/* Names match the QC tracker's provider list EXACTLY (QC-COUNT-FEED-SPEC.md) — the
   qcfeed.v1 provider string flows into that tracker, and identical spelling beats
   fuzzy matching. Rounding-now first. */
const PROVIDERS  = ['Dr. Kassai','Abby Mehler','Kendra Keene','Lolita Hanks','Molly Morris'];
function _optList(base,extra,cur){
  const list=base.slice();
  (extra||[]).forEach(x=>{ if(list.indexOf(x)<0) list.push(x); });   // dedupe: a session-add may later join the seeded list
  cur=(cur||'').trim();
  if(cur && list.indexOf(cur)<0) list.push(cur);   // whatever is stored stays selectable
  return list;
}
function paintFacSel(){
  const sel=document.getElementById('r_fac'), cur=(S.round.fac||'').trim();
  sel.innerHTML='<option value=""></option>'
    + _optList(FACILITIES,S.round.facExtra,cur).map(f=>'<option'+(f===cur?' selected':'')+'>'+esc(f)+'</option>').join('')
    + '<option value="__add__">+ Add a facility…</option>';
}
function paintProvSel(){
  const sel=document.getElementById('r_prov'), cur=(S.round.prov||'').trim();
  sel.innerHTML='<option value=""></option>'
    + _optList(PROVIDERS,S.round.provExtra,cur).map(p=>'<option'+(p===cur?' selected':'')+'>'+esc(p)+'</option>').join('')
    + '<option value="__other__">+ Other…</option>';
}
function setRound(){ S.round.date=document.getElementById('r_date').value; save(); }
function paintRound(){
  document.getElementById('r_date').value = S.round.date || todayISO();
  paintFacSel(); paintProvSel();
}
function onProvPick(sel){
  let v=sel.value;
  if(v==='__other__'){
    const n=prompt('Provider name:',''); v=(n||'').trim();
    if(!v){ paintProvSel(); return; }
    S.round.provExtra=S.round.provExtra||[];
    if(_optList(PROVIDERS,S.round.provExtra,'').indexOf(v)<0) S.round.provExtra.push(v);
  }
  S.round.prov=v; save(); paintProvSel();
}
/* A sheet must only ever carry ONE facility's residents. The facility is round-level, so
   editing it after patients are on the card silently re-labels them — Facility A's resident
   would print under Facility B's header and get handed to B's nurse. That's a disclosure to
   the wrong facility, not a cosmetic bug, so the switch has to be deliberate.
   `facLock` = the facility the patients on this card belong to, set when the first one is added. */
function onFacPick(sel){
  let nf=sel.value;
  if(nf==='__add__'){
    const n=prompt('New facility — exact name:',''); nf=(n||'').trim();
    if(!nf){ paintFacSel(); return; }
    S.round.facExtra=S.round.facExtra||[];
    if(_optList(FACILITIES,S.round.facExtra,'').indexOf(nf)<0) S.round.facExtra.push(nf);
  }
  applyFacChange(nf);
}
function applyFacChange(nf){
  nf=(nf||'').trim(); const lock=(S.round.facLock||'').trim();
  if(!S.pts.length || !lock || nf===lock){ if(!S.pts.length) S.round.facLock=nf; S.round.fac=nf; save(); paintFacSel(); return; }
  const n=S.pts.length;
  const ok=confirm('This card still has '+n+' patient'+(n===1?'':'s')+' from '+lock+'.\n\n'
    + 'A sheet can only carry one facility\'s residents. Send '+lock+'\'s sheet first if you '
    + 'haven\'t.\n\nOK = clear them and start ' + (nf||'the new facility')
    + '\nCancel = stay on '+lock);
  if(ok){ S.pts=[]; S.active=0; S.round.facLock=nf; S.round.fac=nf; save(); paintFacSel(); render(); toast('Started '+(nf||'a new facility')); }
  else  { S.round.fac=lock; save(); paintFacSel(); }
}

/* ---------- patients ---------- */
function addPt(){
  /* The first patient binds the card to whatever facility is in the header right now. */
  if(!S.pts.length) S.round.facLock = (S.round.fac||'').trim();
  S.pts.push(newPt()); S.active = S.pts.length-1; save(); render();
  setTimeout(()=>{ const el=document.getElementById('p_name'); if(el) el.focus(); },50); }
function delPt(i){
  const nm = (S.pts[i]&&S.pts[i].name||'').trim();
  if(!confirm('Remove '+(nm||'this patient')+' from today\'s card?')) return;
  S.pts.splice(i,1);
  if(S.active >= S.pts.length) S.active = Math.max(0, S.pts.length-1);
  save(); render();
}
function pickPt(i){ S.active=i; save(); render(); }
function setPt(f,val){ const p=activePt(); if(!p) return; p[f]=val; save(); paintTabs(); paintCount(); }

/* ---------- wounds ---------- */
function addWound(){ const p=activePt(); if(!p) return; p.wounds.push(newWound()); save(); render(); }
function delWound(i){
  const p=activePt(); if(!p) return;
  if(p.wounds.length===1){ toast('A patient needs at least one wound'); return; }
  if(!confirm('Remove wound '+(i+1)+'?')) return;
  p.wounds.splice(i,1); save(); render();
}
function setW(i,f,val){
  const p=activePt(); if(!p) return;
  p.wounds[i][f]=val; save();
  /* Categorical selects re-render: Type toggles the Stage question, and any of them may now
     read "Other" (which reveals its free-text box) or leave it. Selects don't lose focus, so a
     repaint is safe here. */
  if(['type','stage','drain','odor','status'].indexOf(f)>=0){ render(); return; }
  /* Size inputs are TEXT — never re-render (would drop the keyboard). Just refresh the live calc. */
  if(f==='l'||f==='w'||f==='d'){ const el=document.getElementById('calc_'+i); if(el) el.textContent=calcText(p.wounds[i]); }
}
/* The free-text that a dropdown's "Other" reveals. No re-render — keep the box focused while typing. */
function setWOther(i,f,val){ const p=activePt(); if(!p) return; p.wounds[i][f+'Other']=val; save(); }

/* ---------- render ---------- */
function paintCount(){
  const n = S.pts.filter(p=>(p.name||'').trim()).length;
  document.getElementById('countPill').textContent = n+' patient'+(n===1?'':'s');
}
function paintTabs(){
  const t=document.getElementById('tabs');
  t.innerHTML = S.pts.map((p,i)=>
    '<button class="tab'+(i===S.active?' on':'')+'" onclick="pickPt('+i+')">'+
    esc((p.name||'').trim() || 'Patient '+(i+1))+'</button>').join('')
    + '<button class="tab" onclick="addPt()">+ Patient</button>';
}
/* A categorical dropdown that always offers an "Other" escape; picking "Other" reveals a
   free-text box (bound to <field>Other) so a value that's off the list is never lost. */
function selField(i,w,field,list){
  const cur=w[field]||'';
  const opts=list.indexOf('Other')>=0 ? list : list.concat('Other');
  let h='<select onchange="setW('+i+',\''+field+'\',this.value)"><option value=""></option>'
    + opts.map(o=>'<option'+(o===cur?' selected':'')+'>'+esc(o)+'</option>').join('')
    + '</select>';
  if(cur==='Other'){
    h+='<input class="other-box" value="'+esc(w[field+'Other']||'')+'" placeholder="type it" '
      + 'oninput="setWOther('+i+',\''+field+'\',this.value)">';
  }
  return h;
}
/* A checkbox (pick-multiple) field — matches the composer note's checkbox lines. Stores an ARRAY on
   w[field]; "Other" reveals its free-text box. Tappable pills for the bedside. */
function multiField(i,w,field,list){
  const cur=Array.isArray(w[field])?w[field]:[];
  let h='<div class="checks">'+list.map(o=>{ const on=cur.indexOf(o)>=0;
    return '<label class="chk'+(on?' on':'')+'"><input type="checkbox"'+(on?' checked':'')
      +' onchange="toggleW('+i+',\''+field+'\',\''+o+'\',this.checked)"> '+esc(o)+'</label>';
  }).join('')+'</div>';
  if(cur.indexOf('Other')>=0){
    h+='<input class="other-box" value="'+esc(w[field+'Other']||'')+'" placeholder="type it" '
      +'oninput="setWOther('+i+',\''+field+'\',this.value)">';
  }
  return h;
}
function toggleW(i,field,opt,on){
  const p=activePt(); if(!p) return; const w=p.wounds[i];
  let arr=Array.isArray(w[field])?w[field].slice():[];
  if(on){ if(arr.indexOf(opt)<0) arr.push(opt); } else arr=arr.filter(x=>x!==opt);
  w[field]=arr; save(); render();   // re-render: Type toggles Stage, and "Other" reveals its box
}
function woundHTML(w,i){
  return '<div class="card">'
    + '<div class="wound-head"><b>Wound '+(i+1)+'</b>'
    + '<button class="tiny no-print" onclick="delWound('+i+')">Remove</button></div>'

    + '<label>Where is it</label>'
    + '<input value="'+esc(w.loc)+'" placeholder="e.g. right great toe, sacrum" '
    + 'oninput="setW('+i+',\'loc\',this.value)">'

    + '<label>Type</label>'
    + multiField(i,w,'type',WOUND_TYPES)

    + (isPressure(w) ? '<label>Stage</label>'+selField(i,w,'stage',STAGES) : '')

    + '<label>Size (cm)</label>'
    + '<div class="dims">'
    +   '<input inputmode="decimal" value="'+esc(w.l)+'" placeholder="length" oninput="setW('+i+',\'l\',this.value)">'
    +   '<input inputmode="decimal" value="'+esc(w.w)+'" placeholder="width"  oninput="setW('+i+',\'w\',this.value)">'
    +   '<input inputmode="decimal" value="'+esc(w.d)+'" placeholder="depth"  oninput="setW('+i+',\'d\',this.value)">'
    + '</div>'
    + '<div class="calc" id="calc_'+i+'">'+esc(calcText(w))+'</div>'

    + '<label>Drainage</label>'
    + selField(i,w,'drain',DRAINAGE)

    + '<label>Odor</label>'
    + selField(i,w,'odor',ODOR)

    + '<label>Status</label>'
    + selField(i,w,'status',STATUS)

    + '<label>Wound bed (% tissue)</label>'
    + '<div class="dims" style="grid-template-columns:1fr 1fr 1fr 1fr">'
    +   '<input inputmode="numeric" value="'+esc(w.wbGran||'')+'"   placeholder="% gran"   oninput="setW('+i+',\'wbGran\',this.value)">'
    +   '<input inputmode="numeric" value="'+esc(w.wbSlough||'')+'" placeholder="% slough" oninput="setW('+i+',\'wbSlough\',this.value)">'
    +   '<input inputmode="numeric" value="'+esc(w.wbFib||'')+'"    placeholder="% fibrin" oninput="setW('+i+',\'wbFib\',this.value)">'
    +   '<input inputmode="numeric" value="'+esc(w.wbEpi||'')+'"    placeholder="% epi"    oninput="setW('+i+',\'wbEpi\',this.value)">'
    + '</div>'
    + '<label>Eschar</label>'
    + '<select onchange="setW('+i+',\'wbEschar\',this.value)"><option value=""></option>'
    +   '<option value="yes"'+(w.wbEschar==='yes'?' selected':'')+'>yes</option>'
    +   '<option value="no"'+(w.wbEschar==='no'?' selected':'')+'>no</option></select>'

    + '<label>Exposed structures</label>'
    + multiField(i,w,'exposed',EXPOSED)

    + '<label>Periwound</label>'
    + multiField(i,w,'periwound',PERIWOUND)

    + '<label>Undermining</label>'
    + '<input value="'+esc(w.undermining||'')+'" placeholder="e.g. 2 to 4 o’clock, 0.5 cm — or none" '
    + 'oninput="setW('+i+',\'undermining\',this.value)">'

    + '<label>Tunneling / sinus tract</label>'
    + '<input value="'+esc(w.tunneling||'')+'" placeholder="e.g. 6 o’clock, 1.2 cm — or none" '
    + 'oninput="setW('+i+',\'tunneling\',this.value)">'

    + '<label>Orders</label>'
    + '<textarea placeholder="what the nurse should do — dressing, frequency, offloading, re-check" '

    + '</div>';
}
function render(){
  paintTabs(); paintCount();
  const area=document.getElementById('patientArea'), p=activePt();
  if(!p){
    area.innerHTML='<div class="card" style="text-align:center">'
      + '<div class="muted" style="margin-bottom:10px">No patients on this round yet.</div>'
      + '<button class="primary" onclick="addPt()">Add the first patient</button></div>';
    return;
  }
  area.innerHTML = '<div class="card">'
    + '<label for="p_name">Patient</label>'
    + '<input id="p_name" value="'+esc(p.name)+'" placeholder="name or room number" '
    + 'oninput="setPt(\'name\',this.value)">'
    + '<div class="row no-print" style="margin-top:10px">'
    +   '<button class="tiny" onclick="delPt('+S.active+')">Remove patient</button></div>'
    + '</div>'
    + p.wounds.map(woundHTML).join('')
    + '<button class="ghost no-print" onclick="addWound()">+ Add another wound</button>'
    + '<div class="card" style="margin-top:14px">'
    +   '<label for="p_edu">Additional info, plan &amp; education</label>'
    +   '<textarea id="p_edu" placeholder="plan, patient education, tunneling / undermining, precautions — anything else for the nurse" '
    +   'oninput="setPt(\'edu\',this.value)">'+esc(p.edu||'')+'</textarea>'
    + '</div>';
}

/* ---------- the sheet the nurse gets ---------- */
function sheetText(list){
  const r=S.round, L=[];
  L.push('WOUND CARE ORDERS');
  L.push('Facility: '+v(r.fac)+'    Date: '+v(r.date));
  L.push('Provider: '+v(r.prov));
  L.push('');
  const pts = list || S.pts.filter(p=>(p.name||'').trim());
  pts.forEach(p=>{
    L.push('----------------------------------------');
    L.push('PATIENT: '+v(p.name));
    p.wounds.forEach((w,i)=>{
      L.push('');
      L.push('  Wound '+(i+1)+' — '+v(w.loc));
      L.push('    Type:     '+v(disp(w,'type')) + (isPressure(w) ? '   Stage: '+v(disp(w,'stage')) : ''));
      L.push('    Size:     '+v(sizeText(w)));
      L.push('    Drainage: '+v(disp(w,'drain')));
      L.push('    Odor:     '+v(disp(w,'odor')));
      L.push('    Status:   '+v(disp(w,'status')));
      { const wb=wbText(w); if(wb) L.push('    Wound bed:'+wb); }
      { const exp=disp(w,'exposed'); if(exp) L.push('    Exposed:  '+exp); }
      { const pw=disp(w,'periwound'); if(pw) L.push('    Periwound:'+pw); }
      if((w.undermining||'').trim()) L.push('    Undermining: '+w.undermining.trim());
      if((w.tunneling||'').trim())   L.push('    Tunneling:   '+w.tunneling.trim());
      L.push('    ORDERS:   '+v(w.orders));
    });
    if((p.edu||'').trim()){
      L.push('');
      L.push('  Additional info, plan & education:');
      L.push('    '+p.edu.trim());
    }
    L.push('');
  });
  L.push('----------------------------------------');
  L.push('Care-coordination orders for facility use. Not an official medical record or');
  L.push('billing document; the signed EHR note is the authoritative record.');
  return L.join('\n');
}
/* Status as a colored badge (green improving / neutral stable / red worsening) so the nurse can scan
   the sheet at a glance. Inline background + color so it degrades to colored text if a mail/Word client
   ignores the background. */
function statusBadge(w){
  const s=disp(w,'status'); if(!s) return '<span class="val-muted">—</span>';
  const t=String(s).toLowerCase();
  const cls = t.indexOf('improv')>=0 ? 'b-imp' : (t.indexOf('wors')>=0 ? 'b-wor' : 'b-stb');
  return '<span class="badge '+cls+'">'+esc(s)+'</span>';
}
/* The nurse's sheet — a real document, not a text dump: teal header band, one clean card per patient,

   +".pt-hd{background:#eef4f2;border-bottom:1px solid #d7e5e1;padding:9px 15px;font-size:12.5pt;font-weight:700;color:#0c5f56;border-radius:10px 10px 0 0}"

/* ---------- review / confirm ---------- */
/* Has the provider actually put anything into this patient? Used to tell an empty
   just-tapped-+Patient card apart from one with real work in it. */
function hasContent(p){
  if(String(p.edu||'').trim()) return true;
  return p.wounds.some(w => ['loc','type','stage','l','w','d','drain','odor','status','wbGran','wbSlough','wbFib','wbEpi','wbEschar','exposed','periwound','undermining','tunneling','orders']
    .some(f => (Array.isArray(w[f])? w[f].length>0 : String(w[f]||'').trim()!=='')));
}
function findGaps(){
  const g=[];
  if(!(S.round.fac||'').trim()) g.push('Facility is blank');
  if(!(S.round.prov||'').trim()) g.push('Provider is blank — the saved file is labeled by provider (sign-in can fill it for you)');
  S.pts.forEach((p,pi)=>{
    const named = (p.name||'').trim();
    /* An unnamed patient is DROPPED from the sheet (the nurse can't act on "somebody").
       If it's unnamed but has orders in it, that's a silent loss of real work — the one
       failure mode that must never be quiet. Say so first and loudly. */
    if(!named){
      if(hasContent(p)) g.push('⚠ Patient '+(pi+1)+' has no name — IT WILL NOT BE SENT. Add a name or room number.');
      return;   // nothing else to say about an empty unnamed card
    }
    if(p.send===false) return;   // held back this send — don't nag about its gaps
    p.wounds.forEach((w,i)=>{
      const tag = named+' · wound '+(i+1);
      if(!(w.orders||'').trim()) g.push(tag+': no orders — the nurse gets nothing to do');
      if(!(w.loc||'').trim())    g.push(tag+': no location');
      if(!(w.status||'').trim()) g.push(tag+': no status (improving / stable / worsening)');
      if(isPressure(w) && !(w.stage||'').trim()) g.push(tag+': pressure wound with no stage');
    });
  });
  return g;
}
function openReview(){
  const named = S.pts.filter(p=>(p.name||'').trim());
  if(!named.length){
    /* Don't say "add a patient" to someone who just filled a whole round in and only
       missed the names — that reads as though their work is gone. Name the real problem. */
    toast(S.pts.some(hasContent)
      ? 'Nothing can be sent yet — your patients still need a name or room number'
      : 'Add a patient first');
    return;
  }
  const sel=document.getElementById('toSel');
  sel.innerHTML = FACILITY_CONTACTS.map((c,i)=>'<option value="'+i+'">'+esc(c.name)+' — '+esc(c.email)+'</option>').join('');
  paintReview();
  document.getElementById('review').classList.add('on');
}
function closeReview(){ document.getElementById('review').classList.remove('on'); }

/* The patients this send will actually carry: named AND still checked. Everything downstream
   (preview, email, print, Save to ClinicalVault) runs off this one set. */
function sentNamed(){ return S.pts.filter(p=>(p.name||'').trim() && p.send!==false); }
function toggleSend(id,on){ const p=S.pts.find(x=>x.id===id); if(p){ p.send=on; save(); paintReview(); } }
function setAllSend(on){ S.pts.forEach(p=>{ if((p.name||'').trim()) p.send=on; }); save(); paintReview(); }

/* The "send which patients?" chooser. Hidden when there's only one named patient — nothing to choose,
   so no needless control (fewer taps for the provider). */
function paintSendPick(){
  const el=document.getElementById('sendPick'); if(!el) return;
  const named=S.pts.filter(p=>(p.name||'').trim());
  if(named.length<=1){ el.innerHTML=''; return; }
  const sel=named.filter(p=>p.send!==false).length;
  el.innerHTML='<div class="sp-head"><b>Send which patients?</b> <span class="muted">'+sel+' of '+named.length+' selected</span>'
    +'<span class="sp-btns"><button class="tiny" onclick="setAllSend(true)">All</button>'
    +'<button class="tiny" onclick="setAllSend(false)">None</button></span></div>'
    +'<div class="sp-list">'+named.map(p=>{ const on=p.send!==false;
      return '<label class="sp-item'+(on?' on':'')+'"><input type="checkbox"'+(on?' checked':'')
        +' onchange="toggleSend(\''+esc(p.id)+'\',this.checked)"> '+esc(p.name.trim())+'</label>';
    }).join('')+'</div>';
}
/* Repaint the whole review screen from the current selection — gaps, chooser, preview, and whether the
   send buttons are live. Called on open and on every checkbox toggle. */
function paintReview(){
  const gaps=findGaps();
  document.getElementById('gaps').innerHTML = gaps.length
    ? '<div class="warn"><b>Worth a look before you send:</b><br>· '+gaps.map(esc).join('<br>· ')+'</div>'
    : '';
  paintSendPick();
  const pts=sentNamed();
  const prev=document.getElementById('prev');
  if(pts.length){
    // Show the ACTUAL styled sheet the nurse will get (isolated in an iframe so its own CSS applies),
    // not a plain-text dump — so "Review" looks like the real document.
    prev.innerHTML='<iframe class="prev-frame" title="Sheet preview"></iframe>';
    const pf=prev.querySelector('iframe'); pf.srcdoc=sheetHTML(pts);
    // While Chrome's (false) "dangerous site" flag is up it can refuse ANY frame on this site —
    // the preview then shows "This content is blocked. Contact the site owner…" (Scott 2026-07-20).
    // Email/print/save don't depend on this frame; swap in an inline Shadow-DOM render so the
    // provider still SEES the sheet before sending.
    setTimeout(function(){
      let ok=false;
      try{ const d=pf.contentDocument; ok=!!(d && d.body && d.body.childNodes.length); }catch(e){ ok=false; }
      if(ok || !pf.parentNode) return;
      const host=document.createElement('div');
      host.className='prev-frame'; host.style.overflow='auto'; host.style.background='#fff';
      try{ host.attachShadow({mode:'open'}).innerHTML=sheetHTML(sentNamed()); }
      catch(e){ host.textContent='Preview unavailable while Chrome’s site warning is active — Email, Print, and Save still send the full sheet.'; }
      pf.replaceWith(host);
    }, 400);
  } else {
    prev.innerHTML='<div class="prev-empty">No patients selected to send.</div>';
  }
  const none=pts.length===0;
  ['emailBtn','printBtn','vaultBtn'].forEach(id=>{ const b=document.getElementById(id); if(b) b.disabled=none; });
}

/* ---------- deliver ---------- */
function printSheet(){
  const html=sheetHTML(sentNamed());
  // Normal path: print from a hidden same-page iframe. While Chrome's (false) site flag is up it can
  // refuse ANY frame on this site (contentDocument null / write throws) — fall back to a fresh blank
  // popup, which the flag doesn't touch.
  try{
    const f=document.createElement('iframe');
    f.style.cssText='position:fixed;right:0;bottom:0;width:0;height:0;border:0';
    document.body.appendChild(f);
    const d=f.contentDocument; if(!d) throw new Error('frame blocked');
    d.open(); d.write(html); d.close();
    /* A document.write'n iframe may be ready BEFORE onload fires (mobile Safari) or only after
       (Chrome) — so both paths have to be able to trigger the print. `done` makes sure exactly one
       of them wins: without it the provider gets two print dialogs and prints the sheet twice. */
    let done=false;
    const go=()=>{
      if(done) return; done=true;
      try{ f.contentWindow.focus(); f.contentWindow.print(); }catch(e){ toast('Couldn’t open the print dialog'); }
      setTimeout(()=>f.remove(), 1000);
    };
    f.onload=go;
    setTimeout(go, 400);
  }catch(e){
    const w=window.open('','_blank');
    if(!w){ toast('Chrome blocked the print window — allow pop-ups for this site and try again'); return; }
    w.document.open(); w.document.write(html); w.document.close();
    setTimeout(()=>{ try{ w.focus(); w.print(); }catch(x){} },250);
  }
}
function emailSheet(){
  const i=document.getElementById('toSel').value;
  const c=FACILITY_CONTACTS[i];
  if(!c){ toast('No facility contact set up yet'); return; }
  const pts=sentNamed();
  if(!pts.length){ toast('No patients selected to send'); return; }
  const r=S.round, n=pts.length;
  const subj='Wound care orders — '+(r.fac||'')+' — '+(r.date||'')+' ('+n+' patient'+(n===1?'':'s')+')';
  const body=sheetText(pts);
  /* Stage on the clipboard first: older mail apps silently truncate a long mailto body,
     so the paste-fallback has to exist BEFORE the draft opens. */
  try{ navigator.clipboard && navigator.clipboard.writeText(body); }catch(e){}
  const url='mailto:'+encodeURIComponent(c.email)+'?subject='+encodeURIComponent(subj)
    +'&body='+encodeURIComponent(body);
  if(url.length > 1900){
    const short='The orders are on your clipboard — tap in the message body and paste.';
    location.href='mailto:'+encodeURIComponent(c.email)+'?subject='+encodeURIComponent(subj)
      +'&body='+encodeURIComponent(short);
    toast('Draft opened — paste the orders in, then check it and send');
  } else {
    location.href=url;
    toast('Draft opened — check it, then send');
  }
}

/* ---------- Save to ClinicalVault — Microsoft Graph upload ----------
   Reuses the Note Composer's proven machinery verbatim: same Entra SPA app, same
   redirect.html, same folder discipline. Egress is Microsoft-ONLY (sign-in + the
   practice's own BAA-covered SharePoint). Two things are filed per save:
   1) the orders sheet (.doc) -> Daily Handoffs/<facility>/<date>/, provider named
      in the filename (Scott 2026-07-18) — this IS the facility handoff record now;
   2) one roundcard.v1 JSON per named patient -> RoundCards/<facility>/<name-slug>.json,
      overwritten on re-save (latest bedside capture wins) — the Note Composer reads
      these to auto-create the patient and pre-fill the note (card feeds the note). */
const VAULT_CFG = {
  clientId:  '3702875f-471b-4878-a009-8a2575b41db3',   // LaVida Entra SPA app (client ID is public by design)
  tenantId:  'cc541639-168a-4a8d-9880-4e3628918b70',
  spHost:    'lavidah.sharepoint.com',
  sitePath:  '/sites/ClinicalVault',
  scopes:    ['Sites.ReadWrite.All']
};
/* SANDBOX MODE (?sandbox=1, LOCALHOST ONLY — the hosted site ignores it): points every
   upload at the ToolSandbox SharePoint site so end-to-end tests never touch the real
   vault. Belt (config): sitePath is swapped. Suspenders (guard): _gfetch refuses any
   URL naming the real vault while sandboxed. Best isolation: run tests signed in as
   the guest account that has NO ClinicalVault permission — then Microsoft itself is
   the wall, not this code. Synthetic data only, even here. */
const SANDBOX = (()=>{ const q=new URLSearchParams(location.search);
  return q.get('sandbox')==='1' && (location.hostname==='localhost'||location.hostname==='127.0.0.1'); })();
if(SANDBOX){
  VAULT_CFG.sitePath='/sites/ToolSandbox';
  document.addEventListener('DOMContentLoaded',()=>{ const s=document.getElementById('hdrSub');
    if(s) s.textContent='🧪 SANDBOX — saves go to the test site, never the real vault'; });
}
let _pca=null;
async function _getPca(){
  if(_pca) return _pca;
  if(!(window.msal && window.msal.PublicClientApplication))
    throw new Error('Sign-in library didn’t load — this only works on the hosted site, not a local file.');
  const redirectUri = location.origin + location.pathname.replace(/[^/]*$/, '') + 'redirect.html';
  _pca=new window.msal.PublicClientApplication({
    auth:{ clientId:VAULT_CFG.clientId, authority:'https://login.microsoftonline.com/'+VAULT_CFG.tenantId, redirectUri },
    cache:{ cacheLocation:'sessionStorage', storeAuthStateInCookie:false }   // clears on tab close (PHI-friendly)
  });
  await _pca.initialize();
  return _pca;
}
/* When shown inside the composer overlay (an iframe), NEVER run our own interactive auth — a redirect
   would navigate the iframe. Ask the parent composer (which owns the signed-in session) for a token. */
function _tokenFromParent(){
  return new Promise((resolve,reject)=>{
    const id='rt'+Date.now()+'_'+Math.floor(Math.random()*1e6);
    const to=setTimeout(()=>{ window.removeEventListener('message',h); reject(new Error('Couldn’t get access from the composer — make sure you’re signed in there, then tap Save again.')); }, 20000);
    function h(e){ if(e.origin!==location.origin) return; const d=e.data;
      if(!d || d.type!=='rc-token-response' || d.id!==id) return;
      clearTimeout(to); window.removeEventListener('message',h);
      if(d.token) resolve(d.token); else reject(new Error(d.error||'The composer couldn’t provide access.'));
    }
    window.addEventListener('message',h);
    try{ parent.postMessage({type:'rc-token-request', id, scopes:VAULT_CFG.scopes}, location.origin); }
    catch(e){ clearTimeout(to); window.removeEventListener('message',h); reject(e); }
  });
}
/* Pre-fill the Provider box from whoever's signed in (Scott 2026-07-20) — the rounding provider IS the
   signed-in user, so making them pick from the dropdown is redundant. Standalone: read our own MSAL
   account. Overlay (iframe): the card has no account of its own (it borrows the composer's token), so ask
   the parent composer for the name. Never overrides a provider already chosen; it's a default, editable. */
function _providerFromParent(){
  return new Promise((resolve)=>{
    const id='rp'+Date.now()+'_'+Math.floor(Math.random()*1e6);
    const to=setTimeout(()=>{ window.removeEventListener('message',h); resolve(''); }, 8000);
    function h(e){ if(e.origin!==location.origin) return; const d=e.data;
      if(!d || d.type!=='rc-provider-response' || d.id!==id) return;
      clearTimeout(to); window.removeEventListener('message',h); resolve(d.name||''); }
    window.addEventListener('message',h);
    try{ parent.postMessage({type:'rc-provider-request', id}, location.origin); }
    catch(e){ clearTimeout(to); window.removeEventListener('message',h); resolve(''); }
  });
}
async function _autoFillProvider(){
  if((S.round.prov||'').trim()) return;                 // a chosen provider wins — never overwrite it
  let nm='';
  try{
    if(window.self!==window.top){ nm=await _providerFromParent(); }
    else { const pca=await _getPca(); const a=pca.getAllAccounts()[0]; nm=(a&&(a.name||a.username))||''; }
  }catch(e){}
  nm=String(nm||'').trim();
  if(nm && !(S.round.prov||'').trim()){ S.round.prov=nm; save(); paintProvSel(); }
}
async function _vaultToken(){
  if(window.self!==window.top) return await _tokenFromParent();
  const pca=await _getPca(), req={scopes:VAULT_CFG.scopes};
  const acct=pca.getAllAccounts()[0];
  if(acct){ try{ return (await pca.acquireTokenSilent(Object.assign({account:acct},req))).accessToken; }catch(e){} }
  /* No popup (unreliable on static hosting + phones) — full-page redirect. The round survives it:
     state is in sessionStorage, which persists across same-tab navigation. On return, tap Save again.
     If the provider came from the Composer they're already signed in to Microsoft, so the redirect
     bounces straight back without re-typing credentials. */
  await pca.acquireTokenRedirect(req);
  throw new Error('redirecting to sign in…');
}
function _gfetch(url,token,opts){
  if(SANDBOX && /ClinicalVault/i.test(url)) throw new Error('SANDBOX guard: blocked a call to the real vault.');
  opts=opts||{}; opts.headers=Object.assign({Authorization:'Bearer '+token},opts.headers||{}); return fetch(url,opts);
}
function _encPath(rel){ return rel.split('/').map(encodeURIComponent).join('/'); }
async function _vaultSiteId(token){
  const r=await _gfetch('https://graph.microsoft.com/v1.0/sites/'+VAULT_CFG.spHost+':'+VAULT_CFG.sitePath,token);
  if(!r.ok) throw new Error('Couldn’t reach the ClinicalVault site (HTTP '+r.status+'). Sign in with a LaVida account that has access.');
  return (await r.json()).id;
}
async function _vaultDriveId(token,siteId){
  const r=await _gfetch('https://graph.microsoft.com/v1.0/sites/'+siteId+'/drive',token);
  if(!r.ok) throw new Error('Couldn’t open the document library (HTTP '+r.status+').');
  return (await r.json()).id;
}
// Folders are made once and never deleted, so re-checking on every save (esp. the new auto-save) was
// pure waste. Remember what we've ensured this session; clear on a failure so a real gap re-checks.
const _ensuredFolders=new Set();
async function _vaultEnsureFolders(token,driveId,segs){
  const ck=driveId+'|'+segs.join('/'); if(_ensuredFolders.has(ck)) return;
  let parent='';
  for(let i=0;i<segs.length;i++){
    const seg=segs[i], childRel=parent?parent+'/'+seg:seg;
    const c=await _gfetch('https://graph.microsoft.com/v1.0/drives/'+driveId+'/root:/'+_encPath(childRel),token);
    if(c.status===404){
      const parentUrl=parent
        ? 'https://graph.microsoft.com/v1.0/drives/'+driveId+'/root:/'+_encPath(parent)+':/children'
        : 'https://graph.microsoft.com/v1.0/drives/'+driveId+'/root/children';
      const mk=await _gfetch(parentUrl,token,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:seg,folder:{},'@microsoft.graph.conflictBehavior':'fail'})});
      if(!mk.ok && mk.status!==409) throw new Error('Couldn’t create the “'+seg+'” folder (HTTP '+mk.status+').');
    } else if(!c.ok){ throw new Error('Folder check failed (HTTP '+c.status+').'); }
    parent=childRel;
  }
  _ensuredFolders.add(ck);
}
async function _vaultUpload(token,driveId,segs,filename,blob,ctype){
  const url='https://graph.microsoft.com/v1.0/drives/'+driveId+'/root:/'+_encPath(segs.join('/')+'/'+filename)+':/content';
  const r=await _gfetch(url,token,{method:'PUT',headers:{'Content-Type':ctype||'application/msword'},body:blob});
  if(!r.ok) throw new Error('Upload failed (HTTP '+r.status+').');
  return await r.json();
}
/* ---------- AUTO-SAVE patient records to ClinicalVault as you go (Scott 2026-07-20) ----------
   The manual "☁ Save to ClinicalVault" button still does the full send (handoff sheet + every record +
   QC count). This ADDITIONALLY streams each patient's roundcard.v1 record to RoundCards/<fac>/<id>.json
   a few seconds after you edit them, so a round is never lost if the tab closes and you don't have to
   remember the button. SILENT token only — never a disruptive sign-in redirect; if you're not signed in
   yet it quietly waits. Only patients whose content actually changed upload (per-id signature). The
   handoff sheet + QC count stay on the manual button on purpose (those are "round is done" actions). */
let _rcAutoT=null, _rcAutoBusy=false, _rcAutoAgain=false;
const _rcCloudSig={};   // patient id -> last-uploaded content signature
function _rcHm(){ const d=new Date(); let h=d.getHours(); const ap=h<12?'AM':'PM'; h=h%12||12; return h+':'+String(d.getMinutes()).padStart(2,'0')+' '+ap; }
/* Persistent save-status bar. Always shows a meaningful state (never blank), in the STICKY teal header
   (#rcSyncStatusHdr — always visible no matter how far you scroll, Scott 2026-07-20) and mirrored in
   the Review modal (#rcSyncStatus2, which covers the header). Local sessionStorage save is always
   happening (survives refresh); this bar reports the CLOUD backup — the part a provider needs to trust. */
let _rcSyncState='';
function _rcPaintSync(state, when){
  if(state) _rcSyncState=state;
  let txt='', warn=false;
  switch(_rcSyncState){
    case 'saving': txt='☁ Saving to ClinicalVault…'; break;
    case 'saved':  txt='☁ Backed up to ClinicalVault · '+(when||_rcHm()); break;
    case 'ready':  txt='☁ Auto-saving to ClinicalVault as you go'; break;
    case 'local':  txt='● Saved on this device — sign in to back up to ClinicalVault'; warn=true; break;
    case 'error':  txt='⚠ Couldn’t reach ClinicalVault — kept safe on this device, will retry'; warn=true; break;
    default:       txt='';
  }
  const hdr=document.getElementById('rcSyncStatusHdr');   // white-on-teal header: light text, light-amber warn
  if(hdr){ hdr.textContent=txt; hdr.style.color=warn?'#ffd9a0':'rgba(255,255,255,.9)'; hdr.style.fontWeight=warn?'600':'400'; }
  const mod=document.getElementById('rcSyncStatus2');     // Review modal: normal palette
  if(mod){ mod.textContent=txt; mod.style.color=warn?'#b4690e':'var(--muted)'; mod.style.fontWeight=warn?'600':'400'; }
}
// On load, show whether we're backed-up-capable (signed in) or device-only. Silent — never prompts.
(async function _rcSyncInit(){ try{ const t=await _vaultTokenSilent(); _rcPaintSync(t?'ready':'local'); }catch(e){ _rcPaintSync('local'); } })();
function _rcSig(p){ return JSON.stringify({n:p.name||'', e:p.edu||'', w:p.wounds||[], f:S.round.fac||'', d:S.round.date||'', pr:S.round.prov||''}); }
async function _vaultTokenSilent(){
  try{
    if(window.self!==window.top){ try{ return await _tokenFromParent(); }catch(e){ return null; } }
    const pca=await _getPca(); const acct=pca.getAllAccounts()[0]; if(!acct) return null;
    return (await pca.acquireTokenSilent({scopes:VAULT_CFG.scopes, account:acct})).accessToken;   // NO redirect fallback
  }catch(e){ return null; }
}
function scheduleRcAutoSave(){ clearTimeout(_rcAutoT); _rcAutoT=setTimeout(rcAutoSaveCloud, 2000); }   // was 4s — snappier backup (Scott 2026-07-20)
async function rcAutoSaveCloud(){
  if(_rcAutoBusy){ _rcAutoAgain=true; return; }
  const named=(S.pts||[]).filter(p=>(p.name||'').trim() && p.send!==false);
  const dirty=named.filter(p=>{ if(!p.id) p.id=newId(); return _rcCloudSig[p.id]!==_rcSig(p); });
  if(!dirty.length) return;
  const token=await _vaultTokenSilent(); if(!token){ _rcPaintSync('local'); return; }   // not signed in — device-only, no nagging
  _rcAutoBusy=true; _rcPaintSync('saving');
  try{
    const siteId=await _vaultSiteId(token), driveId=await _vaultDriveId(token,siteId);
    const fac=cleanSeg(S.round.fac)||'Unfiled';
    const date=/^\d{4}-\d{2}-\d{2}/.test(String(S.round.date||''))?S.round.date.slice(0,10):'undated';
    const recSegs=['RoundCards',fac];
    await _vaultEnsureFolders(token,driveId,recSegs);
    let n=0;
    for(const p of dirty){
      const id=p.id||newId();
      const rec={ schema:'roundcard.v1', id:id, savedAt:new Date().toISOString(), key:ptSlug(p.name),
        facility:S.round.fac||'', date:date, provider:S.round.prov||'',
        patient:{name:p.name}, edu:p.edu||'', wounds:p.wounds };
      const jb=new Blob([JSON.stringify(rec)],{type:'application/json'});
      await _vaultUpload(token,driveId,recSegs,id+'.json',jb,'application/json');
      _rcCloudSig[id]=_rcSig(p); n++;
    }
    _rcPaintSync('saved');
    // if we're inside the composer overlay, nudge it to pull the freshly-saved records
    try{ if(window.parent && window.parent!==window) window.parent.postMessage({type:'rc-saved'}, location.origin); }catch(e){}
  }catch(e){ _ensuredFolders.clear(); _rcPaintSync('error'); }
  finally{ _rcAutoBusy=false; if(_rcAutoAgain){ _rcAutoAgain=false; scheduleRcAutoSave(); } }
}
/* Path hygiene — same sanitizer as the composer: no traversal, no illegal SharePoint chars. */
function cleanSeg(s){
  s=String(s||'').replace(/[\\/:*?"<>|#%]/g,'').replace(/\s+/g,' ').trim();
  if(/^\.+$/.test(s)) s='';
  return s;
}
/* Stable per-patient key so a re-save OVERWRITES instead of duplicating. */
function ptSlug(name){
  return String(name||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'') || 'patient';
}
function _vaultResultShow(ok,msg,url){
  const el=document.getElementById('vaultResult'); if(!el) return;
  el.className=ok?'vault-ok':'vault-err';
  el.innerHTML=(ok?'✓ ':'⚠ ')+esc(msg)+(ok&&url?(' · <a href="'+esc(url)+'" target="_blank" rel="noopener">open in SharePoint</a>'):'');
  el.style.display='';
}
async function saveVault(){
  const pts=sentNamed();
  if(!pts.length){ toast('Select at least one named patient to send'); return; }
  const btn=document.getElementById('vaultBtn'); btn.disabled=true;
  const st=t=>{ btn.textContent=t; };
  const resEl=document.getElementById('vaultResult'); if(resEl) resEl.style.display='none';
  try{
    st('Signing in…');
    const token=await _vaultToken();
    /* Provider designator: if the field is blank, take the signed-in account's name so the
       filename always says WHO rounded (Scott 2026-07-18). */
    try{
      const a=_pca.getAllAccounts()[0];
      if(a && !(S.round.prov||'').trim()){ S.round.prov=a.name||a.username||''; save(); paintRound(); }
    }catch(e){}
    const fac  = cleanSeg(S.round.fac) || 'Unfiled';
    const date = /^\d{4}-\d{2}-\d{2}/.test(String(S.round.date||'')) ? S.round.date.slice(0,10) : 'undated';
    const prov = cleanSeg(S.round.prov) || 'Provider unlisted';
    st('Preparing folders…');
    const siteId=await _vaultSiteId(token);
    const driveId=await _vaultDriveId(token,siteId);
    const sheetSegs=['Daily Handoffs',fac,date];
    await _vaultEnsureFolders(token,driveId,sheetSegs);

    const item=await _vaultUpload(token,driveId,sheetSegs,
      'Wound Orders — '+fac+' — '+date+' — '+prov+'.doc',blob,'application/msword');
    st('Saving patient records…');
    const recSegs=['RoundCards',fac];
    await _vaultEnsureFolders(token,driveId,recSegs);
    /* Each patient's record is filed under their STABLE id (RoundCards/<fac>/<id>.json), not a
       name-slug — so two genuinely-different same-name patients get separate files, and the composer
       can tell them apart and never double-pulls one. The id also rides inside the record as the
       composer's match key. Re-saving the same patient reuses their id, so it overwrites (latest
       bedside capture wins) instead of duplicating. `key` keeps the old name-slug for readability. */
    for(const p of pts){
      const id=p.id || newId();
      const rec={ schema:'roundcard.v1', id:id, savedAt:new Date().toISOString(), key:ptSlug(p.name),
        facility:S.round.fac||'', date:date, provider:S.round.prov||'',
        patient:{name:p.name}, edu:p.edu||'', wounds:p.wounds };
      const jb=new Blob([JSON.stringify(rec)],{type:'application/json'});
      await _vaultUpload(token,driveId,recSegs,id+'.json',jb,'application/json');
      try{ _rcCloudSig[id]=_rcSig(p); }catch(e){}   // keep auto-save in step so it won't re-upload these
    }

       facility+provider+date so the QC program can catch visits that never became a PCC
       note. Deliberately no names — a bare count is not PHI, so this feed can later flow
       outside the vault (Power Automate → QC tracker) with zero HIPAA friction.
       `patientCount` is the contract field name — don't rename casually. */
    st('Logging QC count…');
    await _vaultEnsureFolders(token,driveId,['QC Feed']);
    const qc={ schema:'qcfeed.v1', date:date, facility:S.round.fac||'', provider:S.round.prov||'',
      patientCount:pts.length, savedAt:new Date().toISOString() };
    await _vaultUpload(token,driveId,['QC Feed'], date+' — '+fac+' — '+prov+'.json',

    st('✓ Saved');
    /* If we're running inside the composer's overlay iframe, tell it to pull the patients we just
       filed — so the provider closes the card and they're already in the note, no extra step. */
    try{ if(window.parent && window.parent!==window) window.parent.postMessage({type:'rc-saved'}, location.origin); }catch(e){}
    _vaultResultShow(true,'Sheet + '+pts.length+' patient record'+(pts.length===1?'':'s')+' + QC count saved to ClinicalVault.',item&&item.webUrl);

  }catch(e){
    if(/redirecting/.test((e&&e.message)||'')){ st('Redirecting to sign-in…'); return; }   // page is navigating away

/* Finish a returning sign-in redirect (clears any stuck interaction state, activates the account). */
(async()=>{

    if(!window.msal) return;
    const pca=await _getPca();
    const res=await pca.handleRedirectPromise();
    const acct=(res&&res.account)||pca.getAllAccounts()[0];
    if(acct) pca.setActiveAccount(acct);

/* ---------- idle auto-lock (BYOD defense-in-depth — ported from the composer) ----------
   On a phone the tab never truly "closes," so wipe-on-close is weak there. After 15 min
   untouched, IF there's something to protect (a named patient = PHI on screen, or a live
   sign-in token), wipe sessionStorage (round + MSAL token) and reload. ?idle=<seconds>
   overrides for testing. See [[BYOD & Mobile Device Policy]]. */
(() => {
  /* Inside the composer overlay (an iframe) we must NOT run our own lock — it would clear the
     SHARED sessionStorage (the composer's workspace + MSAL token). Instead, forward activity to
     the parent so the COMPOSER's idle timer sees the card being used (iframe events don't reach
     the parent window on their own). The composer's lock then covers the whole tab. */
  if(window.self !== window.top){
    const ping=()=>{ try{ parent.postMessage('rc-activity', location.origin); }catch(e){} };
    ['mousemove','mousedown','keydown','touchstart','scroll','wheel','focus','input','change'].forEach(ev =>
      window.addEventListener(ev, ping, {passive:true, capture:true}));
    return;
  }
  const qs = new URLSearchParams(location.search);
  const IDLE_MS = (/^\d+$/.test(qs.get('idle')||'')) ? parseInt(qs.get('idle'))*1000 : 15*60*1000;
  let lastActivity = Date.now();
  const bump = () => { lastActivity = Date.now(); };
  ['mousemove','mousedown','keydown','touchstart','scroll','wheel','focus'].forEach(ev =>
    window.addEventListener(ev, bump, {passive:true, capture:true}));
  let locking = false;
  function lock(){
    if(locking) return;
    let named=false;    try{ named=S.pts.some(p=>(p.name||'').trim()); }catch(e){}
    let signedIn=false; try{ signedIn=!!(_pca && _pca.getAllAccounts && _pca.getAllAccounts().length); }catch(e){}
    if(!named && !signedIn){ lastActivity = Date.now(); return; }   // nothing to protect — re-arm, don't nag
    locking = true;
    try{ sessionStorage.clear(); }catch(e){}                        // wipes the round + MSAL token
    const u = new URL(location.href); u.searchParams.set('locked','1');
    location.replace(u.toString());
  }
  function check(){ if(Date.now() - lastActivity >= IDLE_MS) lock(); }
  const POLL = Math.min(30*1000, Math.max(1000, Math.floor(IDLE_MS/3)));
  setInterval(check, POLL);
  document.addEventListener('visibilitychange', () => { if(document.visibilityState==='visible') check(); });
  if(qs.get('locked')==='1'){ setTimeout(()=>toast('Locked after inactivity — your round was cleared for privacy.'), 400); }
})();

/* ---------- PHI input hygiene (ported from the composer) ----------
   Stop the phone's keyboard/browser from REMEMBERING patient names and orders typed here:
   autofill/autocorrect suggestions could resurface PHI in other apps' text fields. */
function _hardenPHIInput(el){
  if(!el || el.__phiHardened) return;
  const tag=el.tagName, type=(el.type||'').toLowerCase();
  if(tag!=='TEXTAREA' && !(tag==='INPUT' && (type===''||type==='text'||type==='search'||type==='date'))) return;
  el.setAttribute('autocomplete','off'); el.setAttribute('autocorrect','off');
  el.setAttribute('autocapitalize','off'); el.setAttribute('spellcheck','false');
  el.setAttribute('data-lpignore','true'); el.setAttribute('data-1p-ignore','true');
  el.__phiHardened=true;
}
(function(){
  document.querySelectorAll('input,textarea').forEach(_hardenPHIInput);
  try{
    const mo=new MutationObserver(muts=>muts.forEach(m=>m.addedNodes&&m.addedNodes.forEach(n=>{
      if(n.nodeType!==1) return;
      if(n.matches&&n.matches('input,textarea')) _hardenPHIInput(n);
      if(n.querySelectorAll) n.querySelectorAll('input,textarea').forEach(_hardenPHIInput);
    })));
    mo.observe(document.body,{childList:true,subtree:true});
  }catch(e){}
})();

/* ---------- clear ---------- */
function clearAll(){
  if(!confirm('Wipe today\'s round off this phone? This can\'t be undone.')) return;
  S=blank(); try{ sessionStorage.removeItem(KEY); }catch(e){}
  paintRound(); render(); toast('Cleared');
}

/* ---------- boot ---------- */
if(!S.round.date) S.round.date=todayISO();
paintRound(); render(); save();
_autoFillProvider();   // pre-fill Provider from whoever's signed in (fire-and-forget; no-op if none / already set)
/* When shown inside the composer's overlay (an iframe), the "Notes" link would load the
   composer INSIDE this frame — hide it; the overlay's ✕ Close is the way back. */
if(window.self !== window.top){ const n=document.getElementById('rcNotesLink'); if(n) n.style.display='none'; }
</script>
